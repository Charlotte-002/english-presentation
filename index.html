<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Presentation Practice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #f4f6f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      max-width: 520px;
      width: 100%;
      padding: 40px 36px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #5a6270;
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .timer {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      color: #2d5a8e;
      margin-bottom: 24px;
      min-height: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      margin: 6px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-record { background: #c0392b; color: #fff; }
    .btn-stop   { background: #2c3e50; color: #fff; }
    .btn-play   { background: #27ae60; color: #fff; }

    .status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #7f8c8d;
      min-height: 1.4em;
    }

    audio {
      width: 100%;
      margin-top: 20px;
      display: none;
    }

    audio.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>English Presentation Practice</h1>
    <p class="subtitle">
      Click Record, speak your presentation in English,<br />
      then play it back to review.
    </p>

    <div class="timer" id="timer">00:00</div>

    <button class="btn btn-record" id="recordBtn">Record</button>
    <button class="btn btn-stop"   id="stopBtn"   disabled>Stop</button>
    <button class="btn btn-play"   id="playBtn"   disabled>Play</button>

    <p class="status" id="status">Ready. Click Record to start.</p>
    <audio id="player" controls></audio>
  </div>

  <script>
    const recordBtn = document.getElementById("recordBtn");
    const stopBtn   = document.getElementById("stopBtn");
    const playBtn   = document.getElementById("playBtn");
    const status    = document.getElementById("status");
    const timer     = document.getElementById("timer");
    const player    = document.getElementById("player");

    let mediaRecorder = null;
    let chunks = [];
    let audioUrl = null;
    let seconds = 0;
    let timerInterval = null;

    function formatTime(s) {
      const m = String(Math.floor(s / 60)).padStart(2, "0");
      const sec = String(s % 60).padStart(2, "0");
      return m + ":" + sec;
    }

    function startTimer() {
      seconds = 0;
      timer.textContent = "00:00";
      timerInterval = setInterval(() => {
        seconds++;
        timer.textContent = formatTime(seconds);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    recordBtn.addEventListener("click", async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = [];
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: "audio/webm" });
          if (audioUrl) URL.revokeObjectURL(audioUrl);
          audioUrl = URL.createObjectURL(blob);
          player.src = audioUrl;
          player.classList.add("show");
          playBtn.disabled = false;
          status.textContent = "Recording saved. Click Play to review.";
          stream.getTracks().forEach((t) => t.stop());
        };

        mediaRecorder.start();
        startTimer();
        recordBtn.disabled = true;
        stopBtn.disabled = false;
        playBtn.disabled = true;
        status.textContent = "Recording... speak your presentation now.";
      } catch (err) {
        status.textContent = "Microphone access denied. Please allow mic permission.";
      }
    });

    stopBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        stopTimer();
        recordBtn.disabled = false;
        stopBtn.disabled = true;
      }
    });

    playBtn.addEventListener("click", () => {
      if (player.src) player.play();
    });
  </script>
</body>
</html>
