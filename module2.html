<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Module 2 - Presentation Practice</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav"></div>

  <div class="container">
    <h1 class="page-title">Presentation Practice</h1>
    <p class="page-sub" id="todayDate"></p>

    <div class="card">
      <h2 id="theme" style="font-size: 1.2rem; margin-bottom: 6px;"></h2>
      <p class="hint-text" id="themeDesc"></p>

      <div class="scene-stage">
        <div class="scene-bg" id="sceneBg"></div>
        <div class="window"></div>
        <div class="table"></div>
        <div class="characters">
          <div class="character" id="char1">
            <div class="char-head"></div>
            <span class="char-label">Colleague</span>
          </div>
          <div class="character" id="charYou">
            <div class="char-head you"></div>
            <span class="char-label">You</span>
          </div>
          <div class="character" id="char2">
            <div class="char-head"></div>
            <span class="char-label">Manager</span>
          </div>
        </div>
      </div>

      <div class="timer-display" id="timer">00:00</div>

      <div class="controls">
        <button class="btn btn-danger" id="recordBtn">Start Presenting</button>
        <button class="btn btn-ghost" id="stopBtn" disabled>Stop</button>
        <button class="btn btn-ghost" id="clearBtn">Clear Text</button>
        <button class="btn btn-success" id="doneBtn">Mark Complete</button>
      </div>

      <p style="font-weight: 600; margin-bottom: 8px;">Live Transcript</p>
      <div class="transcript-box empty" id="transcript">Your speech will appear here as you speak...</div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/module2.js"></script>
</body>
</html>
